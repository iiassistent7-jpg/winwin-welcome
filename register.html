<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Регистрация Win-Win</title>

  <meta name="theme-color" content="#6c63ff" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #0a0a0f;
      --bg-2: #1a1a2e;
      --accent-1: #6c63ff;
      --accent-2: #00d4aa;
      --text-main: #ffffff;
      --text-muted: #a0a0b0;
      --error: #ff4d4f;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.08);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --max-width: 480px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(108, 99, 255, 0.14), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(0, 212, 170, 0.12), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), #111122, var(--bg-1));
      background-size: 180% 180%;
      animation: bgShift 15s ease infinite;
    }

    body { display: flex; justify-content: center; align-items: flex-start; padding: 16px; min-height: 100vh; }
    body.rtl { direction: rtl; }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .shell {
      width: 100%;
      max-width: var(--max-width);
      opacity: 0;
      transform: translateY(12px);
      animation: pageIn 0.6s var(--ease-out) forwards;
    }

    @keyframes pageIn { to { opacity: 1; transform: translateY(0); } }

    .panel {
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 24px 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.28);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(108,99,255,0.4), rgba(0,212,170,0.18), rgba(255,255,255,0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ШАПКА */
    .header { text-align: center; margin-bottom: 20px; }
    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .page-title { margin-top: 8px; font-size: 1.05rem; font-weight: 600; color: var(--text-muted); }

    /* ФОРМА */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }

    input[type="text"], input[type="tel"], select {
      width: 100%; background: var(--card); border: 1px solid var(--card-border); color: #fff;
      padding: 12px 16px; border-radius: 14px; font-family: inherit; font-size: 1rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus { border-color: var(--accent-1); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2); }
    input.error, select.error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(255, 77, 79, 0.2); }
    select option { background: var(--bg-2); color: #fff; }

    /* СЕГМЕНТИРОВАННЫЕ КНОПКИ (Radio) */
    .segment-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .segment-label {
      flex: 1; text-align: center; background: var(--card); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 10px 4px; font-size: 0.85rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s; user-select: none; min-width: 70px;
    }
    .segment-label input { display: none; }
    .segment-label:has(input:checked) {
      background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(0,212,170,0.2));
      border-color: rgba(108,99,255,0.5); color: var(--text-main);
    }
    .segment-group.error .segment-label { border-color: var(--error); }

    /* КНОПКА ОТПРАВКИ */
    .submit-btn {
      width: 100%; background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none; color: #fff; font-family: inherit; font-size: 1.05rem; font-weight: 700;
      padding: 16px; border-radius: 999px; margin-top: 8px; cursor: pointer;
      transition: transform 0.2s, filter 0.2s, opacity 0.2s; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .submit-btn:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
    .submit-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;
      background: var(--card); color: var(--text-muted); border: 1px solid var(--card-border);
    }

    /* МЕССЕНДЖЕР ДО ФОРМЫ */
    .messenger-pre { margin-bottom: 20px; padding: 14px; background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; }
    .messenger-pre-btns { display: flex; gap: 8px; margin-top: 10px; }
    .wa-pre-btn, .tg-pre-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 8px; border-radius: 12px; border: 2px solid transparent;
      font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--text-muted); background: rgba(255,255,255,0.05);
    }
    .wa-pre-btn.active { background: rgba(37,211,102,0.15); border-color: #25D366; color: #25D366; }
    .tg-pre-btn.active { background: rgba(42,171,238,0.15); border-color: #2AABEE; color: #2AABEE; }

    .hidden { display: none !important; }

    /* ЯЗЫКОВЫЕ КНОПКИ */
    .lang-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .lang-btn {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 999px; color: var(--text-muted);
      font-family: inherit; font-size: 0.75rem; font-weight: 600; padding: 6px 12px; cursor: pointer; transition: 0.18s;
    }
    .lang-btn:hover, .lang-btn.active { background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(0,212,170,0.2)); border-color: rgba(108,99,255,0.5); color: var(--text-main); }

    .logo-sub { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em; color: var(--text-muted); margin-top: 4px; }
    .page-slogan { font-size: 1.05rem; font-weight: 800; margin-top: 8px; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* ВЫБОР МЕССЕНДЖЕРА */
    .messenger-choice { display: none; flex-direction: column; gap: 12px; margin-top: 8px; animation: pageIn 0.4s var(--ease-out) forwards; }
    .messenger-choice.visible { display: flex; }

    .wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px;
      background: linear-gradient(135deg, #25D366, #128C7E); border: none; border-radius: 999px;
      color: #fff; font-family: inherit; font-size: 1.05rem; font-weight: 700; cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 24px rgba(37,211,102,0.3); transition: transform 0.2s, filter 0.2s;
    }
    .wa-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

    .tg-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px;
      background: linear-gradient(135deg, #2AABEE, #229ED9); border: none; border-radius: 999px;
      color: #fff; font-family: inherit; font-size: 1.05rem; font-weight: 700; cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 24px rgba(42,171,238,0.3); transition: transform 0.2s, filter 0.2s;
    }
    .tg-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

    .choice-title { text-align: center; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }

    .loader {
      display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .niche-checkboxes { display: flex; flex-direction: column; gap: 8px; }
    .niche-cb-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: 0.2s; }
    .niche-cb-item.checked { background: rgba(86,204,242,0.08); border-color: rgba(86,204,242,0.4); }
    .niche-cb-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #56CCF2; flex-shrink: 0; }
    .niche-cb-item span { font-size: 0.9rem; font-weight: 600; color: #e0e0e0; }
  @property --a { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
  @keyframes spin-border-how { to { --a: 360deg; } }
  .btn-how-outer { display: inline-block; border-radius: 999px; padding: 1.5px; background: conic-gradient(from var(--a), rgba(108,99,255,0.15) 0%, rgba(108,99,255,0.15) 40%, #6c63ff 50%, #00d4aa 57%, rgba(108,99,255,0.15) 67%, rgba(108,99,255,0.15) 100%); animation: spin-border-how 2.5s linear infinite; }
  .btn-how-inner { display: inline-flex; align-items: center; padding: 11px 24px; border-radius: 999px; background: #1a1a2e; color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 500; white-space: nowrap; text-decoration: none; cursor: pointer; border: none; }
  .btn-how-inner:hover { background: #232340; color: rgba(255,255,255,0.85); }
  .btn-how-wrap { text-align: center; margin: 14px 0 4px; }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="lang-bar" id="langBar">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="he">עב</button>
        <button class="lang-btn" data-lang="ar">عر</button>
        <button class="lang-btn active" data-lang="ru">РУ</button>
      </div>

      <header class="header">
        <h1 class="logo">Win-Win</h1>
        <div class="logo-sub">N E T W O R K</div>
        <div class="page-slogan" id="pageSlogan">Здесь выигрывают все!</div>
        <div class="page-title" id="pageTitle">Регистрация</div>
      </header>

      <div class="btn-how-wrap">
        <div class="btn-how-outer">
          <a class="btn-how-inner" id="btnHowItWorks" href="https://winwinnetwork.pro/about.html?lang=ru&back=1">Как это работает?</a>
        </div>
      </div>

      <div class="messenger-pre" id="messengerPre">
        <div class="choice-title" id="preTitleText">Выберите удобный мессенджер</div>
        <div class="messenger-pre-btns">
          <button class="wa-pre-btn active" id="waPreBtn" data-messenger="wa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.522 5.855L.057 23.386a.75.75 0 00.923.923l5.562-1.457A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.512-5.228-1.402l-.374-.22-3.899 1.022 1.03-3.774-.242-.389A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
            WhatsApp
          </button>
          <button class="tg-pre-btn" id="tgPreBtn" data-messenger="tg">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Telegram
          </button>
        </div>
      </div>

      <form id="regForm" novalidate>
        
        <div class="form-group role-client hidden">
          <label id="clientNameLabel" style="display: block; text-align: center; font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 16px; letter-spacing: -0.02em;">Как к Вам обращаться?</label>
          <input type="text" id="clientName" name="clientName" placeholder="Введите имя" data-req="client" style="text-align: center; font-size: 1.1rem; padding: 16px; margin-bottom: 24px;">
          <div style="text-align: center;">
            <label id="clientSocialLabel" style="display: block; text-align: center; font-weight: 700; font-size: 1rem; color: #ffffff; margin-bottom: 8px;">Ссылка на соцсеть (необязательно)</label>
            <input type="text" id="clientSocial" name="clientSocial" placeholder="Instagram, Facebook, сайт..." style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); color: var(--text-muted); box-shadow: none;">
          </div>
        </div>

        <div class="form-group role-agent role-business hidden">
          <label id="nameLabel">Ваше имя</label>
          <input type="text" id="fullName" name="fullName" placeholder="Введите данные" data-req="agent,business">
        </div>

        <div class="form-group role-business hidden">
          <label id="nicheLabelForm">Категория бизнеса</label>
          <select id="category" name="category" data-req="business" onchange="updateSubcategories()">
            <option value="" disabled selected id="categoryPlaceholder">Выберите категорию...</option>
            <option value="Красота и эстетика">Красота и эстетика</option>
            <option value="Еда и рестораны">Еда и рестораны</option>
            <option value="Магазины и товары">Магазины и товары</option>
            <option value="Здоровье и медицина">Здоровье и медицина</option>
            <option value="Юриспруденция">Юриспруденция</option>
            <option value="Недвижимость и финансы">Недвижимость и финансы</option>
            <option value="Дом и ремонт">Дом и ремонт</option>
            <option value="Автомобили">Автомобили</option>
            <option value="Праздники и мероприятия">Праздники и мероприятия</option>
            <option value="Обучение и спорт">Обучение и спорт</option>
            <option value="Домашние питомцы">Домашние питомцы</option>
            <option value="Туризм и отдых">Туризм и отдых</option>
            <option value="Бизнес и B2B услуги">Бизнес и B2B услуги</option>
          </select>
        </div>
        <div class="form-group role-business hidden" id="subcategoryGroup" style="display:none;">
          <label id="nicheLabelSub">Специализация <span style="font-size:0.75rem;opacity:0.6;">(можно выбрать несколько)</span></label>
          <div class="niche-checkboxes" id="nicheCheckboxList"></div>
          <input type="hidden" id="niche" name="niche" data-req="business">
        </div>

        <div class="form-group role-business hidden">
          <label id="rewardLabelForm">Бонус за рекомендацию</label>
          <div class="segment-group" id="rewardTypeGroup">
            <label class="segment-label" id="lblPct"><input type="radio" name="rewardType" value="percent" data-req="business"> % от сделки</label>
            <label class="segment-label" id="lblFix"><input type="radio" name="rewardType" value="fixed" data-req="business"> Фикс ₪</label>
            <label class="segment-label" id="lblGift"><input type="radio" name="rewardType" value="gift" data-req="business"> Подарок/услуга</label>
          </div>
          <input type="text" id="rewardValue" name="rewardValue" placeholder="Например: 15 (для %) или 200 (для ₪) или описание подарка" style="margin-top: 8px;" class="hidden" data-req="business" required>
        </div>

        <div class="form-group role-agent role-business hidden">
          <label id="paymentLabel">Как вы предпочитаете получить бонус?</label>
          <div class="segment-group" id="paymentMethodGroup">
            <label class="segment-label"><input type="radio" name="paymentMethod" value="bit" data-req="agent,business"> Bit</label>
            <label class="segment-label"><input type="radio" name="paymentMethod" value="paypal" data-req="agent,business"> PayPal</label>
            <label class="segment-label" id="lblTrans"><input type="radio" name="paymentMethod" value="transfer" data-req="agent,business"> Перевод</label>
            <label class="segment-label" id="lblCash"><input type="radio" name="paymentMethod" value="cash" data-req="agent,business"> Наличные</label>
          </div>
        </div>

        <div class="form-group role-agent role-business hidden">
          <label id="socialLabelForm">Ссылка на сайт/соцсеть (необязательно)</label>
          <input type="text" id="socialLink" name="socialLink" placeholder="Instagram, Facebook, сайт...">
        </div>

        <input type="hidden" id="languageHidden" name="language" value="ru">

        <button type="submit" id="submitBtn" class="submit-btn" disabled>
          <span id="btnText">Зарегистрироваться</span>
          <span class="loader" id="btnLoader"></span>
        </button>

      </form>

      <div class="messenger-choice" id="messengerChoice">
        <div class="choice-title" id="choiceTitle">Выберите мессенджер для продолжения</div>
        <div class="wa-hint" id="waHint" style="text-align:center; font-size:0.95rem; color:#e0e0e0; margin-bottom:12px; line-height:1.5;"></div>
        <a id="waBtn" class="wa-btn" href="#">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.522 5.855L.057 23.386a.75.75 0 00.923.923l5.562-1.457A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.512-5.228-1.402l-.374-.22-3.899 1.022 1.03-3.774-.242-.389A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          WhatsApp
        </a>
        <a id="tgBtn" class="tg-btn" href="#">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          Telegram
        </a>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const role = urlParams.get('role') || 'client';

      const form = document.getElementById("regForm");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const rewardRadios = document.querySelectorAll('input[name="rewardType"]');
      const rewardValue = document.getElementById("rewardValue");

      let selectedMessenger = "wa";
      const waPreBtn = document.getElementById("waPreBtn");
      const tgPreBtn = document.getElementById("tgPreBtn");
      if (waPreBtn) {
        waPreBtn.addEventListener("click", () => {
          selectedMessenger = "wa";
          waPreBtn.classList.add("active");
          tgPreBtn.classList.remove("active");
        });
        tgPreBtn.addEventListener("click", () => {
          selectedMessenger = "tg";
          tgPreBtn.classList.add("active");
          waPreBtn.classList.remove("active");
        });
      }
      if (role === 'client' && document.getElementById("messengerPre")) {
        document.getElementById("messengerPre").style.display = "none";
      }

      const LANG_TEXTS = {
        ru: { 
          slogan:"Здесь выигрывают все!", title_client:"Оставить контакт", title_other:"Регистрация",
          btn_client:"Отправить контакт", btn_reg:"Зарегистрироваться",
          pre_title:"Выберите удобный мессенджер",
          name_agent:"Ваше имя", name_biz:"Название бизнеса",
          pay_agent:"Как вы предпочитаете получить бонус?", pay_biz:"Способ выплаты бонуса",
          niche_label:"Категория бизнеса", reward_label:"Бонус за рекомендацию",
          r_pct:"% от сделки", r_fix:"Фикс ₪", r_gift:"Подарок/Услуга",
          social:"Ссылка на сайт/соцсеть (необязательно)",
          trans:"Перевод", cash:"Наличные"
        },
        en: { 
          slogan:"Here everyone wins!", title_client:"Leave contact", title_other:"Registration",
          btn_client:"Send contact", btn_reg:"Register",
          pre_title:"Choose your messenger",
          name_agent:"Your name", name_biz:"Business name",
          pay_agent:"How do you prefer to receive the bonus?", pay_biz:"How to pay the bonus",
          niche_label:"Business Category", reward_label:"Recommendation Bonus",
          r_pct:"% of deal", r_fix:"Fixed ₪", r_gift:"Gift/Service",
          social:"Website/social link (optional)",
          trans:"Transfer", cash:"Cash"
        },
        he: { 
          slogan:"כאן כולם מרוויחים!", title_client:"השאר פרטים", title_other:"הרשמה",
          btn_client:"שלח פרטים", btn_reg:"להירשם",
          pre_title:"בחר מסנג'ר נוח",
          name_agent:"השם שלך", name_biz:"שם העסק",
          pay_agent:"איך תרצו לקבל את ההטבה?", pay_biz:"איך תעדיפו לשלם את ההטבה?",
          niche_label:"קטגוריית עסק", reward_label:"הטבה על המלצה",
          r_pct:"% מהעסקה", r_fix:"סכום קבוע ₪", r_gift:"מתנה/שירות",
          social:"קישור לאתר/רשת חברתית",
          trans:"העברה", cash:"מזומן"
        },
        ar: { 
          slogan:"هنا الجميع يربح!", title_client:"اترك بيانات", title_other:"تسجيل",
          btn_client:"إرسال البيانات", btn_reg:"تسجيل",
          pre_title:"اختر تطبيق المراسلة",
          name_agent:"اسمك", name_biz:"اسم العمل",
          pay_agent:"كيف تفضل استلام المكافأة؟", pay_biz:"كيف تفضل دفع المكافأة؟",
          niche_label:"فئة العمل", reward_label:"مكافأة التوصية",
          r_pct:"% من الصفقة", r_fix:"مبلغ ثابت ₪", r_gift:"هدية/خدمة",
          social:"رابط الموقع/الشبكة الاجتماعية",
          trans:"تحويل", cash:"نقداً"
        },
      };

      function applyLang(lang) {
        const T = LANG_TEXTS[lang] || LANG_TEXTS.ru;
        document.body.dir = (lang==="he"||lang==="ar") ? "rtl" : "ltr";
        if (document.getElementById("pageSlogan")) document.getElementById("pageSlogan").textContent = T.slogan;
        if (document.getElementById("preTitleText")) document.getElementById("preTitleText").textContent = T.pre_title;
        document.getElementById("pageTitle").textContent = role==="client" ? T.title_client : T.title_other;
        btnText.textContent = role==="client" ? T.btn_client : T.btn_reg;
        
        if (document.getElementById("nameLabel"))
          document.getElementById("nameLabel").textContent = role==="business" ? T.name_biz : T.name_agent;
        if (document.getElementById("paymentLabel"))
          document.getElementById("paymentLabel").textContent = role==="agent" ? T.pay_agent : T.pay_biz;
        if (document.getElementById("nicheLabelForm")) document.getElementById("nicheLabelForm").textContent = T.niche_label;
        if (document.getElementById("rewardLabelForm")) document.getElementById("rewardLabelForm").textContent = T.reward_label;
        if (document.getElementById("socialLabelForm")) document.getElementById("socialLabelForm").textContent = T.social;
        
        if (document.getElementById("lblPct")) document.getElementById("lblPct").innerHTML = `<input type="radio" name="rewardType" value="percent" data-req="business"> ${T.r_pct}`;
        if (document.getElementById("lblFix")) document.getElementById("lblFix").innerHTML = `<input type="radio" name="rewardType" value="fixed" data-req="business"> ${T.r_fix}`;
        if (document.getElementById("lblGift")) document.getElementById("lblGift").innerHTML = `<input type="radio" name="rewardType" value="gift" data-req="business"> ${T.r_gift}`;
        
        if (document.getElementById("lblTrans")) document.getElementById("lblTrans").innerHTML = `<input type="radio" name="paymentMethod" value="transfer" data-req="agent,business"> ${T.trans}`;
        if (document.getElementById("lblCash")) document.getElementById("lblCash").innerHTML = `<input type="radio" name="paymentMethod" value="cash" data-req="agent,business"> ${T.cash}`;

        document.getElementById("languageHidden").value = lang;
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang===lang));
        var btnHow = document.getElementById("btnHowItWorks");
        if (btnHow) {
          var howLabels = { ru: 'Как это работает?', he: 'איך זה עובד?', en: 'How does it work?', ar: 'كيف يعمل؟' };
          btnHow.textContent = howLabels[lang] || howLabels.ru;
          btnHow.href = 'https://winwinnetwork.pro/about.html?lang=' + lang + '&back=1';
        }
      }

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.addEventListener("click", () => applyLang(btn.dataset.lang));
      });

      document.querySelectorAll(`.role-${role}`).forEach(el => el.classList.remove('hidden'));
      applyLang("ru");

      rewardRadios.forEach(radio => {
        radio.addEventListener('change', () => {
          rewardValue.classList.remove('hidden');
          const type = document.querySelector('input[name="rewardType"]:checked')?.value;
          if (type === 'percent') rewardValue.placeholder = 'Например: 15 (будет 15% от сделки)';
          else if (type === 'fixed') rewardValue.placeholder = 'Например: 200 (фиксированная сумма ₪)';
          else if (type === 'gift') rewardValue.placeholder = 'Опишите подарок: Бесплатная консультация';
          validateForm();
        });
      });

      const getRequiredElements = () => {
        const reqEls = [];
        form.querySelectorAll(`input[type="text"][data-req*="${role}"], input[type="tel"][data-req*="${role}"], select[data-req*="${role}"]`).forEach(el => {
          if(el.id === 'rewardValue' && el.classList.contains('hidden')) return; 
          reqEls.push(el);
        });
        ['rewardType', 'paymentMethod'].forEach(name => {
          const radio = form.querySelector(`input[name="${name}"][data-req*="${role}"]`);
          if (radio) reqEls.push({ isRadioGroup: true, name: name });
        });
        return reqEls;
      };

      const checkValidation = () => {
        let isValid = true;
        getRequiredElements().forEach(el => {
          if (el.isRadioGroup) {
            if (!form.querySelector(`input[name="${el.name}"]:checked`)) isValid = false;
          } else {
            if (!el.value.trim()) isValid = false;
            else if (el.type === 'tel' && el.pattern && !new RegExp(el.pattern).test(el.value.trim())) isValid = false;
          }
        });
        const chosenType = form.querySelector('input[name="rewardType"]:checked');
        if (chosenType && chosenType.value !== 'gift' && !rewardValue.value.trim()) isValid = false;
        return isValid;
      };

      const validateForm = () => { submitBtn.disabled = !checkValidation(); };

      form.addEventListener('focusout', (e) => {
        const el = e.target;
        if ((el.tagName === 'INPUT' || el.tagName === 'SELECT') && el.dataset.req && el.dataset.req.includes(role)) {
          if (!el.value.trim() || (el.type === 'tel' && el.pattern && !new RegExp(el.pattern).test(el.value.trim())))
            el.classList.add('error');
          else el.classList.remove('error');
        }
        validateForm();
      });

      form.addEventListener('input', (e) => {
        if(e.target.classList.contains('error')) e.target.classList.remove('error');
        if(e.target.type === 'radio') e.target.closest('.segment-group')?.classList.remove('error');
        validateForm();
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!checkValidation()) {
          getRequiredElements().forEach(el => {
            if (el.isRadioGroup) {
              if (!form.querySelector(`input[name="${el.name}"]:checked`))
                document.getElementById(el.name + 'Group')?.classList.add('error');
            } else if (!el.value.trim()) el.classList.add('error');
          });
          return;
        }

        submitBtn.disabled = true;
        btnText.style.display = 'none';
        document.getElementById('btnLoader').style.display = 'inline-block';

        const payload = { role };
        payload.sender = urlParams.get('sender') || '';
        payload.receiver = urlParams.get('receiver') || '';
        payload.type = urlParams.get('type') || '';
        payload.source_url = window.location.href;

        form.querySelectorAll('input[type="text"], input[type="tel"], textarea').forEach(el => {
          if (el.name) payload[el.name] = el.value;
        });
        form.querySelectorAll('select').forEach(el => {
          if (el.name) payload[el.name] = el.value;
        });
        ['rewardType', 'paymentMethod', 'messenger'].forEach(name => {
          const checked = form.querySelector(`input[name="${name}"]:checked`);
          if (checked) payload[name] = checked.value;
        });
        
        const activeLangBtn = document.querySelector('.lang-btn.active');
        if (activeLangBtn) payload.language = activeLangBtn.dataset.lang;

        try {
          const response = await fetch('https://amlatsa-bot-production.up.railway.app/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          let respData = {};
          try { respData = await response.clone().json(); } catch(e) {}

          if (response.ok) {
            let waText = "Добро пожаловать в Win-Win Network!\nВы завершаете регистрацию. Нажмите отправить 👉";
            let tgStart = "start";

            if (respData.temp_key) {
              if (role === 'client') {
                waText = "client_reg_" + respData.temp_key;
                tgStart = "client_reg_" + respData.temp_key;
              } else {
                waText = "reg_" + respData.temp_key;
                tgStart = "reg_" + respData.temp_key;
              }
            }

            const _wa_hints = {
              ru: "Добро пожаловать в Win-Win Network!\nВы завершаете регистрацию. Нажмите отправить 👉",
              en: "Welcome to Win-Win Network!\nYou are completing your registration. Please tap Send 👉",
              he: "ברוכים הבאים ל-Win-Win Network!\nאתם משלימים את ההרשמה. לחצו שלח 👈",
              ar: "مرحباً بك في Win-Win Network!\nأنت تكمل تسجيلك. اضغط إرسال 👈"
            };
            const _ui_lang = document.documentElement.lang || "ru";
            const waTextHinted = waText + "\n" + (_wa_hints[_ui_lang] || _wa_hints.ru);

            if (role === 'client') {
              form.style.display = "none";
              const choice = document.getElementById("messengerChoice");
              choice.classList.add("visible");
              const _ui_hints = {
                ru: "Нажмите WhatsApp, а затем кнопку Отправить 👇",
                en: "Tap WhatsApp, then press Send 👇",
                he: "לחצו WhatsApp ואז על שלח 👇",
                ar: "اضغط WhatsApp ثم أرسل 👇"
              };
              const waHintEl = document.getElementById("waHint");
              if (waHintEl) waHintEl.textContent = _ui_hints[_ui_lang] || _ui_hints.ru;
              
              document.getElementById("waBtn").href = "https://wa.me/972534218573?text=" + encodeURIComponent(waTextHinted);
              document.getElementById("tgBtn").href = "https://t.me/winwin_lead_bot?start=" + encodeURIComponent(tgStart);
            } else {
              if (selectedMessenger === "wa") {
                window.location.href = "https://wa.me/972534218573?text=" + encodeURIComponent(waTextHinted);
              } else {
                window.location.href = "https://t.me/winwin_lead_bot?start=" + encodeURIComponent(tgStart);
              }
            }
          } else {
            throw new Error('Server error');
          }
        } catch (error) {
          alert('Произошла ошибка при отправке данных. Пожалуйста, попробуйте позже.');
        }

        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        document.getElementById('btnLoader').style.display = 'none';
      });
    });

    const SUBCATEGORIES = {
      "Красота и эстетика": ["Косметология","Инъекционная косметология","Лазерная эпиляция","Эпиляция","Перманентный макияж","Удаление тату и татуажа","Стилисты по волосам и барберы","Ногтевой сервис","Брови и ресницы","Макияж","SPA и релакс-массаж"],
      "Еда и рестораны": ["Рестораны и кафе","Доставка еды и рационы","Авторская выпечка и десерты","Бары и пабы","Кейтеринг и банкеты"],
      "Магазины и товары": ["Одежда, обувь и аксессуары","Мебель и товары для дома","Ювелирные изделия","Цветы и подарки","Косметика и парфюмерия"],
      "Здоровье и медицина": ["Стоматология","Психология и психотерапия","Физиотерапия и остеопатия","Диетология и нутрициология","Альтернативная медицина","Лечебный массаж","Оптика и зрение"],
      "Юриспруденция": ["Коммерческое право (для бизнеса)","Недвижимость","Семейное право","Иммиграция и визы","Уголовное право","Травмы и Битуах Леуми","Нотариусы и переводы"],
      "Недвижимость и финансы": ["Недвижимость (купля/продажа/аренда)","Ипотека и рефинансирование","Бухгалтерия и налоги","Страхование (все виды)"],
      "Дом и ремонт": ["Ремонт под ключ","Электрика","Сантехника","Кондиционеры","Клининг и химчистка","Дизайн интерьера","Сборка и ремонт мебели"],
      "Автомобили": ["Ремонт и СТО","Детейлинг и мойка","Автоподбор и продажа","Аренда авто"],
      "Праздники и мероприятия": ["Фото и видеосъемка","Ведущие и музыканты","Организация мероприятий","Декораторы"],
      "Обучение и спорт": ["Фитнес и тренеры","Репетиторы и курсы","Языковые школы","Детские кружки и секции"],
      "Домашние питомцы": ["Ветеринария","Груминг","Зоомагазины","Передержка и выгул"],
      "Туризм и отдых": ["Турагентства","Отели и апартаменты","Гиды и экскурсии"],
      "Бизнес и B2B услуги": ["Маркетинг и SMM","Разработка сайтов и ПО","Дизайн и брендинг","Консалтинг и коучинг","Логистика и доставка"]
    };

    function updateSubcategories() {
      const cat = document.getElementById('category').value;
      const subGroup = document.getElementById('subcategoryGroup');
      const list = document.getElementById('nicheCheckboxList');
      const nicheInput = document.getElementById('niche');
      const subs = SUBCATEGORIES[cat] || [];
      list.innerHTML = '';
      nicheInput.value = '';
      subs.forEach(s => {
        const item = document.createElement('label');
        item.className = 'niche-cb-item';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = s;
        cb.addEventListener('change', () => {
          item.classList.toggle('checked', cb.checked);
          const checked = Array.from(list.querySelectorAll('input:checked')).map(c => c.value);
          nicheInput.value = checked.join(', ');
        });
        const span = document.createElement('span');
        span.textContent = s;
        item.appendChild(cb);
        item.appendChild(span);
        list.appendChild(item);
      });
      if (subs.length > 0) {
        subGroup.style.display = 'block';
        subGroup.classList.remove('hidden');
      }
    }
  </script>
